<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>小怡 - Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet" />
  <style>
    :root{
      --bg:#121212; --text:#fff; --accent:#E5E1FF;
      --bubble-light:rgba(229,225,255,.28);
      --bubble-xiaoyi:rgba(45, 45, 85, 0.4);
      --border:rgba(229,225,255,.42);
    }
    *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;} 
    html, body { margin:0; height:100%; background:var(--bg); color:var(--text); overflow:hidden; font-family:'ZCOOL KuaiLe', sans-serif; }
    
    .bg-layer{ position:fixed; inset:0; background:url('./images/bg.jpg') center/cover no-repeat; z-index:0; }
    .bg-layer::after{ content:""; position:absolute; inset:0; background:rgba(0,0,0,0.5); }
    
    .shell{ position:relative; z-index:10; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .chat-box{ width:min(820px,calc(100% - 32px)); height:70vh; border:1px solid var(--border); border-radius:20px; background:rgba(0,0,0,0.3); backdrop-filter:blur(10px); display:flex; flex-direction:column; overflow:hidden; }
    
    .messages{ flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:16px; }
    .bubble{ max-width:76%; padding:12px 18px; border-radius:20px; font-size:14px; line-height:1.6; position:relative; }
    .bubble.left{ align-self:flex-start; background:var(--bubble-xiaoyi); border-bottom-left-radius:4px; }
    .bubble.right{ align-self:flex-end; background:var(--bubble-light); border-bottom-right-radius:4px; }
    
    .bubble.loading::after { content: '...'; animation: blink 1s infinite; }
    @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }

    .composer{ border-top:1px solid var(--border); padding:12px; display:flex; gap:10px; background:rgba(0,0,0,0.2); }
    .input{ flex:1; background:#111; border:1px solid var(--border); border-radius:12px; color:#fff; padding:10px 15px; outline:none; font-family:inherit; }
    .send-btn{ background:var(--accent); color:#000; border:none; border-radius:12px; padding:0 20px; cursor:pointer; font-family:inherit; }
  </style>
</head>
<body>
  <div class="bg-layer"></div>
  <main class="shell">
    <div class="chat-box">
      <div id="messages" class="messages"></div>
      <form id="composer" class="composer">
        <input id="msgInput" class="input" placeholder="输入你想说的话..." autocomplete="off">
        <button type="submit" class="send-btn">发送</button>
      </form>
    </div>
  </main>

  <script>
    const i18n = {
      zh: { loading: '正在回复中...', error: '哎呀，我这边系统有点小卡顿，等下再陪你聊～💛' },
      en: { loading: 'Replying...', error: 'Oops, system is laggy. Let\'s chat later~ 💛' }
    };

    let currentLang = "zh";
    const msgContainer = document.getElementById('messages');
    const msgInput = document.getElementById('msgInput');
    const composer = document.getElementById('composer');

    // 初始消息
    addMessage('left', 'Hi，我是小怡！你今天过得怎么样呀？');

    function addMessage(side, text, isLoading = false) {
      const div = document.createElement('div');
      div.className = `bubble ${side} ${isLoading ? 'loading' : ''}`;
      div.textContent = text;
      msgContainer.appendChild(div);
      msgContainer.scrollTop = msgContainer.scrollHeight;
      return div;
    }

    async function getXiaoyiReply(text) {
      const loadingBubble = addMessage('left', i18n[currentLang].loading, true);
      
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, language: currentLang })
        });

        if (!res.ok) throw new Error("HTTP " + res.status);
        
        const result = await res.json();
        loadingBubble.classList.remove('loading');

        // 【关键】兼容多层级的 JSON 结构
        if (result.data && result.data.reply) {
          loadingBubble.textContent = result.data.reply;
        } else if (result.reply) {
          loadingBubble.textContent = result.reply;
        } else {
          loadingBubble.textContent = "我听着呢，怎么啦？🥰";
        }
      } catch (err) {
        console.error("Fetch Error:", err);
        loadingBubble.classList.remove('loading');
        loadingBubble.textContent = i18n[currentLang].error;
      }
    }

    composer.onsubmit = e => {
      e.preventDefault();
      const val = msgInput.value.trim();
      if (!val) return;
      addMessage('right', val);
      msgInput.value = '';
      getXiaoyiReply(val);
    };
  </script>
</body>
</html>
