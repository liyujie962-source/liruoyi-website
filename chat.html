<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>小怡 - Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet" />
  <style>
    :root{
      --bg:#121212; --text:#fff; --accent:#E5E1FF;
      --bubble-light:rgba(229,225,255,.28);
      --bubble-xiaoyi:rgba(45, 45, 85, 0.4);
      --border:rgba(229,225,255,.42);
      --fade:.3s ease;
    }
    *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;} 
    html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text); overflow: hidden; position: fixed; width: 100%; }
    body{ font-family:'ZCOOL KuaiLe', sans-serif; opacity:0; animation:fade var(--fade) forwards; }
    @keyframes fade{ from{opacity:0} to{opacity:1} }
    
    .bg-layer{ position:fixed; inset:0; background:url('./images/bg.jpg') center/cover no-repeat; z-index:0; }
    .bg-layer::after{ content:""; position:absolute; inset:0; background:rgba(0,0,0,0.5); }
    
    .top-left, .top-right { position: fixed; top: 24px; z-index: 60; }
    .top-left { left: 24px; } .top-right { right: 24px; }
    .icon-btn { border:none; background:transparent; color:#fff; font-size:18px; cursor:pointer; font-family:inherit; }

    .dropdown { position: absolute; top: 30px; width: 168px; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); border-radius: 4px; overflow: hidden; opacity: 0; visibility: hidden; transition: .3s; }
    .dropdown.open { opacity: 1; visibility: visible; }
    .dropdown-item { width: 100%; padding: 10px 12px; color:#fff; text-decoration:none; display:block; border:none; background:transparent; text-align:left; font-family:inherit; cursor:pointer; }
    .dropdown-item:hover { background: rgba(229,225,255,.12); }

    .shell{ position:relative; z-index:10; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .chat-box{ width:min(820px,calc(100% - 32px)); height:calc(100vh - 200px); border:1px solid var(--border); border-radius:20px; background:rgba(229,225,255,.04); display:flex; flex-direction:column; overflow:hidden; }
    
    .messages{ flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:16px; scrollbar-width:thin; }
    .bubble{ max-width:76%; border-radius:24px; padding:14px 18px; font-size:14px; line-height:1.6; }
    .bubble.left{ align-self:flex-start; background:var(--bubble-xiaoyi); border:1px solid rgba(229,225,255,.2); border-bottom-left-radius:8px; }
    .bubble.right{ align-self:flex-end; background:var(--bubble-light); border-bottom-right-radius:8px; }
    .bubble.loading::after { content: '...'; animation: blink 1s infinite; }
    @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }

    .composer{ border-top:1px solid var(--border); padding:12px; display:flex; gap:10px; background:rgba(0,0,0,.25); }
    .input{ flex:1; border:1px solid var(--border); border-radius:16px; background:#111; color:#fff; padding:12px 18px; outline:none; font-family:inherit; }
    .send-btn{ border:1px solid var(--border); border-radius:16px; background:transparent; color:#fff; padding:0 18px; cursor:pointer; font-family:inherit; }

    .footer-center { position: fixed; bottom: 10px; width:100%; text-align:center; font-size:12px; color:#666; font-family:inherit; }
    
    @media (max-width:768px){ .chat-box { height: 62vh; margin-top: 20px; } .shell { justify-content: flex-start; padding-top: 80px; } }
  </style>
</head>
<body>
  <div class="bg-layer"></div>
  
  <div class="top-left">
    <button id="menuBtn" class="icon-btn">☰</button>
    <div id="navMenu" class="dropdown">
      <a class="dropdown-item" href="index.html">❤️ 首页</a>
      <a class="dropdown-item" href="photos.html">📸 小怡的照片墙</a>
      <a class="dropdown-item active">💬 和小怡聊聊天</a>
    </div>
  </div>

  <div class="top-right">
    <button id="langBtn" class="icon-btn">🌐</button>
    <div id="langMenu" class="dropdown">
      <button class="dropdown-item" onclick="switchLang('zh')">中文</button>
      <button class="dropdown-item" onclick="switchLang('en')">English</button>
    </div>
  </div>

  <main class="shell">
    <div class="chat-box">
      <div id="messages" class="messages"></div>
      <form id="composer" class="composer">
        <input id="msgInput" class="input" placeholder="输入你想说的话..." autocomplete="off" />
        <button type="submit" class="send-btn">发送</button>
      </form>
    </div>
  </main>

  <p class="footer-center">欲把西湖比西子 浓妆淡抹总相宜 | Designed by YJ Lee</p>

  <script>
    const i18n = {
      zh: { loading: '正在回复中...', error: '哎呀，系统卡住了，等我缓一下～💛', welcome: 'Hi，我是小怡！你今天过得怎么样呀？' },
      en: { loading: 'Replying...', error: 'Oops, I\'m a bit stuck right now~ 💛', welcome: 'Hi, I\'m Xiaoyi! How was your day?' }
    };
    
    let currentLang = localStorage.getItem('lang') || 'zh';
    const msgBox = document.getElementById('messages');

    function addBubble(side, text, isLoading = false) {
      const b = document.createElement('div');
      b.className = `bubble ${side} ${isLoading ? 'loading' : ''}`;
      b.textContent = text;
      msgBox.appendChild(b);
      msgBox.scrollTop = msgBox.scrollHeight;
      return b;
    }

    async function getReply(text) {
      const loading = addBubble('left', i18n[currentLang].loading, true);
      try {
        // 使用相对路径确保 Vercel 环境下 API 调用准确
        const res = await fetch('./api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, language: currentLang })
        });

        if (!res.ok) throw new Error('API request failed');

        const data = await res.json();
        loading.classList.remove('loading');
        // 自动提取回复内容，防止数据结构不匹配
        loading.textContent = data.reply || (data.data && data.data.reply) || "我听着呢🥰";
      } catch (e) {
        console.error("Fetch Error:", e);
        loading.classList.remove('loading');
        loading.textContent = i18n[currentLang].error;
      }
    }

    document.getElementById('composer').onsubmit = e => {
      e.preventDefault();
      const input = document.getElementById('msgInput');
      const val = input.value.trim();
      if(!val) return;
      addBubble('right', val);
      input.value = '';
      getReply(val);
    };

    function switchLang(l) {
      currentLang = l;
      localStorage.setItem('lang', l);
      location.reload();
    }

    document.getElementById('menuBtn').onclick = e => { e.stopPropagation(); document.getElementById('navMenu').classList.toggle('open'); };
    document.getElementById('langBtn').onclick = e => { e.stopPropagation(); document.getElementById('langMenu').classList.toggle('open'); };
    document.onclick = () => { document.getElementById('navMenu').classList.remove('open'); document.getElementById('langMenu').classList.remove('open'); };

    addBubble('left', i18n[currentLang].welcome);
  </script>
</body>
</html>
