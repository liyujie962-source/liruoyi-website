<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>小怡的照片墙</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #121111;--text: #fff;--accent: #E5E1FF;--muted: rgba(255,255,255,.7);--border: rgba(229,255,255,.4);--t: 0.3s ease;
    }
    *{box-sizing:border-box}
    html,body{margin:0;background:var(--bg);color:var(--text);font-family:"ZCOOL KuaiLe", sans-serif}
    body{opacity:0;animation:fadeIn .3s forwards}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}

    .bg-layer{position:fixed;inset:0;background-image:url('./images/bg.jpg');background-size:cover;background-position:right center;background-repeat:no-repeat;background-attachment:fixed;z-index:0;}
    .bg-layer::after{content:"";position:absolute;inset:0;background:rgba(0,0,0,0.5);}

    .top-left{position:fixed;top:24px;left:24px;z-index:60}
    .top-right{position:fixed;top:24px;right:24px;z-index:60}
    .icon-btn{border:none;background:0 0;color:#fff;font-size:18px;cursor:pointer;font-family:inherit}

    .dropdown{position:absolute;top:30px;width:168px;border-radius:4px;background:transparent;opacity:0;visibility:hidden;transition:all 0.3s ease;}
    .dropdown.open{opacity:1;visibility:visible}
    #navMenu{left:0}#langMenu{right:0}
    .dropdown-item{width:100%;border:none;background:0 0;color:#fff;padding:10px 12px;font-size:14px;cursor:pointer;display:block;text-decoration:none;font-family:inherit}
    .dropdown-item:hover{background:rgba(229,225,255,.12)}
    .dropdown-item.active{color:var(--accent)}

    .shell{position:relative;z-index:10;min-height:100vh;padding:80px 0 90px}
    .topbar{margin:0 100px 14px 200px}
    .subtitle{margin:0 100px 20px 200px;color:var(--muted);font-size:14px}

    .grid{margin:0 100px 0 200px;display:grid;grid-template-columns:repeat(4,1fr);gap:24px}
    .card,.plus-card{border:1px solid var(--border);border-radius:4px;overflow:hidden;background:transparent;cursor:pointer;transition:border-color var(--t)}
    .card:hover,.plus-card:hover{border-color:var(--accent)}
    .thumb-wrap{width:100%;aspect-ratio:4/3;position:relative}
    .multi-photo-badge{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.7);border-radius:4px;padding:2px 6px;font-size:10px;color:#fff;}
    .thumb{width:100%;height:100%;object-fit:cover;display:block}
    .meta{border-top:1px solid var(--border);padding:10px 12px;}
    .meta-name{font-size:14px;}
    .meta-time{font-size:12px;color:var(--muted);}
    .plus-card{min-height:210px;display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:50px;}

    .overlay{position:fixed;inset:0;z-index:99;background:rgba(0,0,0,.9);display:none;opacity:0;transition:opacity var(--t);padding:20px;align-items:center;justify-content:center}
    .overlay.open{display:flex;opacity:1}
    .detail-modal{width:min(1180px,100%);height:min(88vh,760px);border:1px solid var(--border);border-radius:4px;overflow:hidden;display:grid;grid-template-columns:1.15fr 1fr;background:#131313}
    
    .detail-left{border-right:1px solid var(--border);background:#0f0f0f;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .detail-slider{width:100%;height:100%;display:flex;transition:transform var(--t)}
    .detail-slide{min-width:100%;height:100%;}
    .detail-slide img{width:100%;height:100%;object-fit:contain}
    
    .slide-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.4);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;z-index:10;display:none;}
    .detail-left:hover .slide-btn{display:flex;align-items:center;justify-content:center}
    .slide-prev{left:8px} .slide-next{right:8px}
    
    .dots-indicator{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:10}
    .dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.4);cursor:pointer}
    .dot.active{background:#fff}

    .detail-right{padding: 50px 18px 18px 18px;display:flex;flex-direction:column;gap:12px;overflow:auto;position:relative}
    .close-detail-btn{position:absolute;top:18px;right:18px;border:1px solid var(--border);border-radius:4px;background:transparent;color:#fff;font-size:13px;padding:8px 12px;cursor:pointer;}
    .info{border:1px solid var(--border);border-radius:4px;background:rgba(229,225,255,.04);padding:10px 12px;}
    .info .value{font-size:14px;white-space:pre-wrap;}

    .upload-modal{width:min(760px,100%);background:#131313;border:1px solid var(--border);border-radius:4px;padding:18px;max-height:90vh;overflow:auto;position:relative}
    .upload-close{position:absolute;top:18px;right:18px;border:none;background:transparent;color:#fff;font-size:18px;cursor:pointer;}
    .upload-title{font-size:40px;margin:0 0 10px 0}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .field{display:flex;flex-direction:column;gap:5px}
    .field.full{grid-column:1/-1}
    .field span{font-size:12px;color:var(--accent);}
    .input{border:1px solid var(--border);border-radius:4px;background:#101010;color:#fff;padding:10px;outline:0;font-family:inherit}
    .upload-btn{border:1px dashed var(--border);border-radius:4px;padding:20px;text-align:center;color:var(--accent);cursor:pointer;margin-top:5px;}
    
    /* 预览区样式 */
    #filePreviewArea{margin-top:10px;padding:10px;background:rgba(255,255,255,0.05);border-radius:4px;display:none;font-size:13px;color:var(--accent);line-height:1.5}

    .form-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}
    .btn{border:1px solid var(--border);border-radius:4px;background:transparent;color:#fff;font-size:13px;padding:8px 12px;cursor:pointer;}

    .footer-center {position:fixed;left:50%;transform:translateX(-50%);bottom:20px;color:#999;font-size:12px;z-index:50;}
    .footer-right {position:fixed;right:24px;bottom:20px;color:#999;font-size:12px;z-index:50;}
    .globe-icon{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:1.4}
    .title{margin:0;font-size:52px;font-weight:500;}

    @media(max-width:1024px){
      .grid{grid-template-columns:repeat(3,1fr);margin:0 30px}
      .topbar,.subtitle{margin-left:30px;margin-right:30px}
      .detail-modal{grid-template-columns:1fr}
      .detail-left{border-right:none;border-bottom:1px solid var(--border);max-height:45vh}
    }
    @media(max-width:768px){
      .grid{grid-template-columns:1fr}
      .form-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
<div class="bg-layer"></div>

<div class="top-left">
  <button id="menuBtn" class="icon-btn">☰</button>
  <div id="navMenu" class="dropdown">
    <a class="dropdown-item" href="index.html">❤️ 首页</a>
    <a class="dropdown-item active" href="photos.html">📸 小怡的照片墙</a>
    <a class="dropdown-item" href="letter.html">💌 给小怡的话</a>
    <a class="dropdown-item" href="chat.html">💬 和小怡聊天</a>
  </div>
</div>

<div class="top-right">
  <button id="langBtn" class="icon-btn">
    <svg class="globe-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"></circle><ellipse cx="12" cy="12" rx="5" ry="9"></ellipse><ellipse cx="12" cy="12" rx="9" ry="3.8"></ellipse></svg>
  </button>
  <div id="langMenu" class="dropdown">
    <button class="dropdown-item" data-lang="zh">中文</button>
    <button class="dropdown-item" data-lang="en">English</button>
  </div>
</div>

<main class="shell">
  <div class="topbar"><h1 class="title">小怡的照片墙</h1></div>
  <p class="subtitle">分享你和小怡的照片</p>
  <section id="grid" class="grid">
    <div class="plus-card" id="plusBtn" onclick="openUpload()">+</div>
  </section>
</main>

<p class="footer-center">欲把西湖比西子 浓妆淡抹总相宜</p>
<p class="footer-right">Designed by YJ Lee</p>

<div id="detailOverlay" class="overlay">
  <div class="detail-modal">
    <div class="detail-left">
      <button class="slide-btn slide-prev" id="prevBtn">‹</button>
      <div class="detail-slider" id="detailSlider"></div>
      <button class="slide-btn slide-next" id="nextBtn">›</button>
      <div class="dots-indicator" id="dotsIndicator"></div>
    </div>
    <div class="detail-right" id="detailInfo"></div>
  </div>
</div>

<div id="uploadOverlay" class="overlay">
  <form id="uploadForm" class="upload-modal">
    <button type="button" class="upload-close" onclick="closeUpload()">✕</button>
    <h2 class="upload-title">分享瞬间</h2>
    <div class="form-grid">
      <label class="field"><span>你的名字</span><input class="input" name="name" required></label>
      <label class="field"><span>关系</span><input class="input" name="relation" required></label>
      <label class="field"><span>拍摄地点</span><input class="input" name="location"></label>
      <label class="field"><span>拍摄日期</span><input class="input" name="date" type="date" required></label>
      <label class="field full"><span>心情</span><input class="input" name="shortDesc"></label>
      <label class="field full">
        <span>照片（多选）</span>
        <input type="file" id="photoUpload" multiple hidden accept="image/*" onchange="updatePreview(this)">
        <div class="upload-btn" onclick="$('#photoUpload').click()">+ 点击上传照片</div>
        <div id="filePreviewArea"></div>
      </label>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn" id="submitBtn">提交</button>
    </div>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = "https://fwacqqskfzzfvrrighje.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3YWNxcXNrZnp6ZnZycmlnaGplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5NzUzNzcsImV4cCI6MjA5MTU1MTM3N30.XymYjjuOPtAxkwOupbJ5VDQMK-iapdO2A4GJPttxw0w";
  const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let posts = [];
  let currentPost = null;
  let currentImageIndex = 0;
  const $ = s => document.querySelector(s);

  async function loadData() {
    const { data, error } = await _supabase.from('letters').select('*').order('created_at', { ascending: false });
    if (!error && data) {
      posts = data;
      renderGrid();
    }
  }

  function renderGrid() {
    const grid = $("#grid");
    const cardsHtml = posts.map(p => `
      <div class="card" onclick="openDetailById(${p.id})">
        <div class="thumb-wrap">
          <img src="${p.images[0]}" class="thumb" loading="lazy">
          ${p.images.length > 1 ? `<div class="multi-photo-badge">${p.images.length}</div>` : ""}
        </div>
        <div class="meta">
          <div class="meta-name">${p.name} · ${p.relation}</div>
          <div class="meta-time">${p.date}</div>
        </div>
      </div>
    `).join("");
    grid.innerHTML = `<div class="plus-card" onclick="openUpload()">+</div>` + cardsHtml;
  }

  // 上传逻辑
  window.openUpload = () => $("#uploadOverlay").classList.add("open");
  window.closeUpload = () => {
    $("#uploadOverlay").classList.remove("open");
    $("#filePreviewArea").style.display = "none";
    $("#uploadForm").reset();
  };

  window.updatePreview = (input) => {
    const area = $("#filePreviewArea");
    if (input.files.length > 0) {
      area.style.display = "block";
      area.innerHTML = `<strong>已选中 ${input.files.length} 张：</strong><br>` + 
                       Array.from(input.files).map(f => `· ${f.name}`).join("<br>");
    } else {
      area.style.display = "none";
    }
  };

  $("#uploadForm").onsubmit = async (e) => {
    e.preventDefault();
    const btn = $("#submitBtn");
    const files = $("#photoUpload").files;
    if (files.length === 0) return alert("请先选择照片");

    btn.disabled = true;
    const fd = new FormData(e.target);
    
    try {
      const urls = [];
      for (let i = 0; i < files.length; i++) {
        btn.textContent = `上传中 (${i+1}/${files.length})...`;
        const file = files[i];
        const path = `wall/${Date.now()}-${Math.random().toString(36).substr(2,5)}`;
        const { error: upErr } = await _supabase.storage.from('photos').upload(path, file);
        if (upErr) throw upErr;
        const { data: { publicUrl } } = _supabase.storage.from('photos').getPublicUrl(path);
        urls.push(publicUrl);
      }

      const { error: dbErr } = await _supabase.from('letters').insert([{
        name: fd.get("name"),
        relation: fd.get("relation"),
        location: fd.get("location"),
        date: fd.get("date"),
        short_desc: fd.get("shortDesc"),
        images: urls
      }]);

      if (dbErr) throw dbErr;
      location.reload();
    } catch (err) {
      console.error(err);
      alert("上传失败");
      btn.disabled = false;
      btn.textContent = "提交";
    }
  };

  // 详情逻辑
  window.openDetailById = (id) => {
    currentPost = posts.find(p => p.id == id);
    currentImageIndex = 0;
    $("#detailSlider").style.transform = `translateX(0)`;
    $("#detailSlider").innerHTML = currentPost.images.map(img => `<div class="detail-slide"><img src="${img}"></div>`).join("");
    $("#detailInfo").innerHTML = `
      <button class="close-detail-btn" onclick="$('#detailOverlay').classList.remove('open')">✕</button>
      <div class="info"><div class="value"><strong>来自：</strong>${currentPost.name} (${currentPost.relation})</div></div>
      <div class="info"><div class="value"><strong>日期：</strong>${currentPost.date}</div></div>
      <div class="info"><div class="value"><strong>地点：</strong>${currentPost.location || '-'}</div></div>
      <div class="info"><div class="value"><strong>心情：</strong>${currentPost.short_desc || '-'}</div></div>
    `;
    updateDots();
    $("#prevBtn").style.display = $("#nextBtn").style.display = currentPost.images.length > 1 ? "flex" : "none";
    $("#detailOverlay").classList.add("open");
  };

  function updateDots() {
    $("#dotsIndicator").innerHTML = currentPost.images.map((_, i) => `<div class="dot ${i===currentImageIndex?'active':''}"></div>`).join("");
  }

  $("#nextBtn").onclick = (e) => {
    e.stopPropagation();
    currentImageIndex = (currentImageIndex + 1) % currentPost.images.length;
    $("#detailSlider").style.transform = `translateX(-${currentImageIndex * 100}%)`;
    updateDots();
  };
  $("#prevBtn").onclick = (e) => {
    e.stopPropagation();
    currentImageIndex = (currentImageIndex - 1 + currentPost.images.length) % currentPost.images.length;
    $("#detailSlider").style.transform = `translateX(-${currentImageIndex * 100}%)`;
    updateDots();
  };

  // 导航菜单
  $("#menuBtn").onclick = (e) => { e.stopPropagation(); $("#navMenu").classList.toggle("open"); };
  $("#langBtn").onclick = (e) => { e.stopPropagation(); $("#langMenu").classList.toggle("open"); };
  document.onclick = () => { $(".dropdown").classList.remove("open"); };

  loadData();
</script>
</body>
</html>
