<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>给小怡的话</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
  <style>
    :root {--bg: #121111;--text: #ffffff;--accent: #E5E1FF;--muted: rgba(255,255,255,.7);--border: rgba(229,255,255,.4);--t: 0.3s ease;}
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:"ZCOOL KuaiLe", sans-serif}
    body{opacity:0;animation:fadeIn .3s forwards}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}

    .bg-layer {position: fixed;inset: 0;background-image: url('./images/bg.jpg');background-size: cover;background-position: right center;background-repeat: no-repeat;background-attachment: fixed;z-index: 0;}
    .bg-layer::after {content: "";position: absolute;inset: 0;background: rgba(0, 0, 0, 0.5);}

    .top-left{position:fixed;top:24px;left:24px;z-index:60}
    .top-right{position:fixed;top:24px;right:24px;z-index:60}
    .icon-btn{border:none;background:0 0;color:#fff;font-size:18px;cursor:pointer;font-family:"ZCOOL KuaiLe", sans-serif}
    .globe-icon{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:1.4}

    .dropdown{
      position:absolute;top:30px;width:168px;border:none;border-radius:4px;background:transparent;
      backdrop-filter:none;overflow:hidden;opacity:0;visibility:hidden;transition:all 0.3s ease;
    }
    .dropdown.open{opacity:1;visibility:visible}
    #navMenu{left:0}#langMenu{right:0}
    .dropdown-item{width:100%;border:none;background:0 0;color:#fff;padding:10px 12px;font-size:14px;cursor:pointer;transition:all var(--t);display:block;text-decoration:none;font-family:"ZCOOL KuaiLe", sans-serif}
    .dropdown-item:hover{background:rgba(229,225,255,.12)}
    .dropdown-item.active{color:var(--accent)}

    .shell {position: relative; z-index: 10; min-height: 100vh;padding: 80px 0 90px;}
    .topbar {margin:0 100px 14px 200px}
    .title {margin: 0; font-size: 52px; font-weight: 500; letter-spacing: 1px;}
    .subtitle {margin:0 100px 20px 200px; color: var(--muted); font-size: 14px;}
    
    .cards {width: min(860px, calc(100% - 32px)); margin: 0 auto; display: flex; flex-direction: column; gap: 12px;}
    .card {border: 1px solid var(--border); border-radius: 4px; background: rgba(229,225,255,0.05); padding: 16px; position: relative;}
    .card:hover { border-color: var(--accent); }
    .meta {color: var(--accent); font-size: 12px; margin-bottom: 8px;}
    .msg {font-size: 14px; line-height: 1.6; white-space: pre-wrap;}

    .add-btn-container {width: min(860px, calc(100% - 32px)); margin: 20px auto 0;}
    .plus-btn {border: 1px dashed var(--border); border-radius: 4px; background: rgba(229,225,255,0.03); color: var(--accent); width: 100%; padding: 16px; font-size: 32px; cursor: pointer; transition: all var(--t);}
    .plus-btn:hover { border-color: var(--accent); background: rgba(229,225,255,0.08); }

    .overlay {position: fixed; inset: 0; z-index: 99; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity var(--t); padding: 20px;}
    .overlay.open { display: flex; opacity: 1; }
    .modal {width: min(600px, 100%); background: #131313; border: 1px solid var(--border); border-radius: 4px; padding: 24px; display: flex; flex-direction: column; gap: 16px; position: relative;}
    .close-btn {position: absolute; top: 18px; right: 18px; border: none; background: transparent; color: #fff; font-size: 18px; cursor: pointer;}
    .input, .textarea {border: 1px solid var(--border); border-radius: 4px; background: #101010; color: #fff; padding: 10px; outline: none; font-family: inherit; transition: border-color var(--t);}
    .input:focus, .textarea:focus { border-color: var(--accent); }
    .textarea { min-height: 150px; }
    .btn {border: 1px solid var(--border); border-radius: 4px; background: transparent; color: #fff; font-size: 13px; padding: 8px 12px; cursor: pointer; transition: all var(--t); font-family: inherit;}
    .btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(229,225,255,0.12); }
    
    .footer-center {position: fixed; left: 50%; transform: translateX(-50%); bottom: 20px; z-index: 50; font-size: 12px; color: #999;}
    .footer-right {position: fixed; right: 24px; bottom: 20px; color: #999; font-size: 12px; z-index: 50;}

    @media(max-width:1024px){.topbar, .subtitle {margin-left: 30px; margin-right: 30px;}}
  </style>
</head>
<body>
  <div class="bg-layer"></div>

  <div class="top-left">
    <button id="menuBtn" class="icon-btn">☰</button>
    <div id="navMenu" class="dropdown">
      <a class="dropdown-item" href="index.html">❤️ 首页</a>
      <a class="dropdown-item" href="photos.html">📸 小怡的照片墙</a>
      <a class="dropdown-item active" href="letter.html">💌 给小怡的话</a>
      <a class="dropdown-item" href="chat.html">💬 和小怡聊天</a>
    </div>
  </div>
  
  <div class="top-right">
    <button id="langBtn" class="icon-btn">
      <svg class="globe-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"></circle><ellipse cx="12" cy="12" rx="5" ry="9"></ellipse><ellipse cx="12" cy="12" rx="9" ry="3.8"></ellipse></svg>
    </button>
    <div id="langMenu" class="dropdown">
      <button class="dropdown-item" data-lang="zh">中文</button>
      <button class="dropdown-item" data-lang="en">English</button>
    </div>
  </div>

  <main class="shell">
    <div class="topbar"><h1 class="title">给小怡的话</h1></div>
    <p class="subtitle">写下你想对她说的话</p>
    <section id="cards" class="cards"></section>
    <div class="add-btn-container"><button id="openFormBtn" class="plus-btn" type="button">+</button></div>
  </main>

  <p class="footer-center">欲把西湖比西子 浓妆淡抹总相宜</p>
  <p class="footer-right">Designed by YJ Lee</p>

  <div id="formOverlay" class="overlay">
    <form id="messageForm" class="modal">
      <button id="closeFormBtn" type="button" class="close-btn">✕</button>
      <h2 style="margin:0 0 10px; font-size: 32px;">写下你想说的话</h2>
      <input class="input" name="userName" placeholder="你的名字" required />
      <input class="input" name="userCountry" placeholder="国家/地区" />
      <textarea class="textarea" name="userMessage" placeholder="此刻的心情..." required></textarea>
      <div style="text-align:right"><button type="submit" id="submitBtn" class="btn">提交留言</button></div>
    </form>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  (function() {
    const SUPABASE_URL = "https://fwacqqskfzzfvrrighje.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3YWNxcXNrZnp6ZnZycmlnaGplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5NzUzNzcsImV4cCI6MjA5MTU1MTM3N30.XymYjjuOPtAxkwOupbJ5VDQMK-iapdO2A4GJPttxw0w";
    
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const $ = s => document.querySelector(s);

    async function loadLetters() {
      const { data, error } = await _supabase.from('letters').select('*').order('created_at', { ascending: false });
      if(error) { console.error("加载失败:", error); return; }
      $('#cards').innerHTML = (data || []).map(m => `
        <div class="card">
          <div class="meta"><span>来自：${m.name || '匿名'}</span>${m.country ? ` · ${m.country}` : ''}</div>
          <div class="msg">${m.content || ''}</div>
        </div>
      `).join('');
    }

    $('#messageForm').onsubmit = async (e) => {
      e.preventDefault();
      const btn = $('#submitBtn');
      btn.disabled = true;
      btn.textContent = "发送中...";

      const fd = new FormData(e.target);
      // 注意：这里的字段名必须和 Supabase 表里的字段名一模一样
      const { error } = await _supabase.from('letters').insert([{ 
        name: fd.get("userName"), 
        country: fd.get("userCountry"), 
        content: fd.get("userMessage") 
      }]);

      if(error) {
        alert("提交失败，请检查 Supabase 权限 (RLS) 或字段名。错误详情：" + error.message);
        btn.disabled = false;
        btn.textContent = "提交留言";
      } else {
        $('#formOverlay').classList.remove('open');
        setTimeout(() => { $('#formOverlay').style.display = 'none'; }, 300);
        e.target.reset();
        btn.disabled = false;
        btn.textContent = "提交留言";
        loadLetters();
      }
    };

    $('#openFormBtn').onclick = () => {
      $('#formOverlay').style.display = 'flex';
      setTimeout(() => $('#formOverlay').classList.add('open'), 10);
    };
    $('#closeFormBtn').onclick = () => {
      $('#formOverlay').classList.remove('open');
      setTimeout(() => { $('#formOverlay').style.display = 'none'; }, 300);
    };

    const setupMenu = (btn, menu) => {
      btn.onclick = (e) => {
        e.stopPropagation();
        menu.classList.toggle('open');
        (menu === $('#navMenu') ? $('#langMenu') : $('#navMenu')).classList.remove('open');
      };
    };
    setupMenu($('#menuBtn'), $('#navMenu'));
    setupMenu($('#langBtn'), $('#langMenu'));

    document.onclick = () => {
      $('#navMenu').classList.remove('open');
      $('#langMenu').classList.remove('open');
    };

    loadLetters();
  })();
</script>
</body>
</html>
